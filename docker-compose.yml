services:
  homelab-hub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homelab-hub
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    expose:
      - "3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/cybersenpai/docker-data/homelab-hub:/app/data
    networks:
      - proxy-network

networks:
  proxy-network:
    external: true
    name: proxy-network
